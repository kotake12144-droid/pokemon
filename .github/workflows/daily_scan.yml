name: Daily Pokemon Scan

on:
  schedule:
    - cron: '0 8 * * *'  # 毎日 17:00 JST
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Create .env
        run: echo "DISCORD_WEBHOOK=${{ secrets.DISCORD_WEBHOOK }}" > .env

      - name: Run eBay scraper
        run: python scraper.py

      - name: Run pokeca scanner
        run: python pokeca_scan.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.csv pokeca.log
          git diff --staged --quiet || git commit -m "Daily scan $(date +'%Y-%m-%d')"
          git push
